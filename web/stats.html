<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0a08" />
  <title>Impostral — Player stats</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    /* Metric series on the shared dark theme. */
    :root { --m-win: #ff8205; --m-survival: #ffd800; --m-accuracy: #e87ba4; }
    body { overflow: auto; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hud-header">
      <a class="brand" href="/" aria-label="Impostral — home">
        <img src="/assets/impostral.png" alt="Impostral" />
      </a>
      <nav class="hud-nav">
        <a href="/">Back to game</a>
      </nav>
    </header>

    <main class="stats-main">
      <div class="stats-wrap">
        <div class="stats-head">
          <h1>Player stats</h1>
          <button class="btn" id="refresh" type="button" style="min-height:36px; padding:0 16px; font-size:0.62rem;">Refresh</button>
        </div>
        <div id="content"></div>
      </div>
    </main>
  </div>

  <script>
    const pct = (x) => (x * 100).toFixed(0) + "%";
    const cssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    const METRICS = [
      { key: "team_win_rate",  label: "Win rate",       color: "--m-win" },
      { key: "survival_rate",  label: "Survival",       color: "--m-survival" },
      { key: "vote_accuracy",  label: "AI target rate", color: "--m-accuracy" },
    ];

    function bar(value, color) {
      const w = Math.max(0, Math.min(1, value)) * 100;
      const short = w < 22; // Place the label outside a very short bar.
      const val = pct(value);
      const fill = document.createElement("div");
      fill.className = "bar-fill";
      fill.style.width = w + "%";
      fill.style.background = cssVar(color);
      if (!short) {
        const v = document.createElement("span");
        v.className = "bar-value";
        v.textContent = val;
        fill.appendChild(v);
      }
      const track = document.createElement("div");
      track.className = "bar-track";
      track.appendChild(fill);
      if (short) {
        const v = document.createElement("span");
        v.className = "bar-value outside";
        v.textContent = val;
        v.style.position = "absolute";
        v.style.left = "calc(" + w + "% + 6px)";
        v.style.top = "50%";
        v.style.transform = "translateY(-50%)";
        track.appendChild(v);
      }
      return track;
    }

    function renderChart(models) {
      const chart = document.createElement("div");
      chart.className = "chart";

      const legend = document.createElement("div");
      legend.className = "legend";
      for (const m of METRICS) {
        const s = document.createElement("span");
        const sw = document.createElement("span");
        sw.className = "swatch";
        sw.style.background = cssVar(m.color);
        s.appendChild(sw);
        s.appendChild(document.createTextNode(m.label));
        legend.appendChild(s);
      }
      chart.appendChild(legend);

      for (const row of models) {
        const g = document.createElement("div");
        g.className = "model-group";
        const name = document.createElement("div");
        name.className = "model-name";
        name.textContent = row.model + " ";
        const games = document.createElement("small");
        games.textContent = "· " + row.games + " recorded appearance" +
          (row.games === 1 ? "" : "s");
        name.appendChild(games);
        g.appendChild(name);
        if (!row.data_available) {
          const unavailable = document.createElement("p");
          unavailable.className = "stats-unavailable";
          unavailable.textContent = "No compatible human data in historical games.";
          g.appendChild(unavailable);
          chart.appendChild(g);
          continue;
        }
        for (const m of METRICS) {
          const br = document.createElement("div");
          br.className = "bar-row";
          const lab = document.createElement("div");
          lab.className = "bar-label";
          lab.textContent = m.label;
          br.appendChild(lab);
          br.appendChild(bar(row[m.key] || 0, m.color));
          g.appendChild(br);
        }
        chart.appendChild(g);
      }
      return chart;
    }

    function renderTable(models) {
      const scroll = document.createElement("div");
      scroll.className = "table-scroll";
      const t = document.createElement("table");
      t.innerHTML =
        "<thead><tr>" +
        "<th>Player</th><th>Appearances</th><th>Win rate</th><th>Survival</th>" +
        "<th>Vote acc.</th><th>Votes</th><th>Avg rounds</th>" +
        "</tr></thead>";
      const tb = document.createElement("tbody");
      for (const r of models) {
        const tr = document.createElement("tr");
        const metrics = r.data_available
          ? [pct(r.team_win_rate), pct(r.survival_rate), pct(r.vote_accuracy),
            r.votes_total, r.avg_rounds_survived.toFixed(1)]
          : ["—", "—", "—", "—", "—"];
        for (const cell of [r.model, r.games, ...metrics]) {
          const td = document.createElement("td");
          td.textContent = String(cell);
          tr.appendChild(td);
        }
        tb.appendChild(tr);
      }
      t.appendChild(tb);
      scroll.appendChild(t);
      return scroll;
    }

    async function load() {
      const content = document.getElementById("content");
      content.textContent = "";
      let data;
      try {
        const res = await fetch("/stats");
        data = await res.json();
      } catch (e) {
        content.innerHTML = '<div class="card"><p class="empty">Could not load stats.</p></div>';
        return;
      }

      if (!data.models || data.models.length === 0) {
        content.innerHTML =
          '<div class="card"><p class="empty">No games recorded yet.<br>' +
          "Finish a game to populate this page.</p></div>";
        return;
      }

      const c1 = document.createElement("div");
      c1.className = "card";
      c1.innerHTML = "<h2>Comparison</h2>";
      c1.appendChild(renderChart(data.models));
      content.appendChild(c1);

      const c2 = document.createElement("div");
      c2.className = "card";
      c2.innerHTML = "<h2>Details</h2>";
      c2.appendChild(renderTable(data.models));
      const meta = document.createElement("p");
      meta.className = "meta";
      const legacy = data.legacy_games_without_humans || 0;
      meta.textContent = data.total_games + " game" + (data.total_games === 1 ? "" : "s") +
        " recorded. Win rate = winning appearances · Survival = seat alive at game end · " +
        "Vote acc. = share of votes that correctly targeted an AI." +
        (legacy ? ` Human metrics are unavailable for ${legacy} older game${legacy === 1 ? "" : "s"}.` : "");
      c2.appendChild(meta);
      content.appendChild(c2);
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
