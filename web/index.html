<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impostral</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <img class="brand-logo" src="/assets/impostral.png" alt="Impostral" />
    <p class="tagline">Les IA jouent les humains. Démasquez-les avant qu’elles ne vous trompent.</p>
  </header>

  <!-- Écran de connexion -->
  <section id="join-screen" class="panel">
    <label>Salle
      <input id="room-input" type="text" value="salon" autocomplete="off" />
    </label>
    <label>Votre nom (privé)
      <input id="name-input" type="text" placeholder="anonyme" autocomplete="off" />
    </label>
    <button id="join-btn">Rejoindre</button>
    <p id="join-hint" class="hint"></p>
  </section>

  <!-- Écran de jeu -->
  <section id="game-screen" class="hidden">
    <div id="phase-banner">
      <span id="phase-name">—</span>
      <span id="phase-timer"></span>
    </div>
    <p id="phase-prompt" class="prompt"></p>

    <div class="game-layout">
      <aside class="players-panel">
        <div class="section-heading">
          <span>Participants</span>
          <span id="alive-count" class="counter"></span>
        </div>
        <div id="seats"></div>
      </aside>
      <main class="conversation-panel">
        <div class="section-heading">
          <span>Conversation</span>
          <span class="live-indicator"><i></i> en direct</span>
        </div>
        <div id="transcript" aria-live="polite">
          <div class="transcript-empty">La conversation apparaîtra ici.</div>
        </div>
      </main>
    </div>

    <!-- Panneau de saisie contextuel -->
    <div id="input-panel" class="hidden">
      <div id="input-timer" class="input-timer"></div>
      <div id="input-controls"></div>
    </div>

    <div id="log" class="log" aria-live="polite"></div>
  </section>

  <script src="/static/audio.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
